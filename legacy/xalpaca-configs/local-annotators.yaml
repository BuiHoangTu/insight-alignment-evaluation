local_judge_model:
  prompt_template: xalpaca-configs/judge-template.txt
  fn_completions: vllm_local_completions
  completions_kwargs:
    model_name: "meta-llama/Meta-Llama-3-8B-Instruct" # TODO: replace with path to the model
    model_kwargs:
      tokenizer_mode: "auto"
      trust_remote_code: True
      max_model_len: 7000
      tensor_parallel_size: 1 # 2 GPUs
    is_chatml_prompt: true
    max_new_tokens: 100
    temperature: 0.0
    top_p: 1.0
    batch_size: 128
  fn_completion_parser: "ranking_parser"
